# 首板突破战法
# 核心理念：底部首个涨停板往往是一段行情的起点

name: 首板突破战法
description: |
  底部或横盘整理后的第一个涨停板，往往是主力启动信号。
  关键：确认是突破而非诱多。

entry_conditions:
  - "股价横盘整理 20 天以上或处于相对低位"
  - "首次以涨停板突破横盘区间或均线压制"
  - "涨停日成交量 > 20日均量 2 倍"
  - "涨停前 5 日无涨停记录（确认是首板）"
  - "MACD 在零轴附近或刚上穿零轴"
  - "所属板块当日有催化剂"
  - "换手率在 5-15%（适中）"

exit_conditions:
  - "次日放量滞涨"
  - "跌破涨停板日K线的中位价"
  - "连续 3 天无法突破涨停日最高价"
  - "MACD 死叉"

risk_management:
  stop_loss: "涨停板最低价下方 2%"
  position_size: "20-30%"
  take_profit: "突破后看 20-30% 空间"

timeframe: "短线（3-10天）"
suitable_market: "所有市场环境"
