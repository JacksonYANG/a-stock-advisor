# 92科比成长轨迹战法
# 92科比是最具传奇色彩的散户成长记录者，完整公开了从小资金到成名的全过程
# 核心理念：专注主流板块、跟随主力资金、分歧买点

name: 92科比成长轨迹战法
description: |
  92科比（网名）是散户逆袭的典型代表，以公开实盘记录闻名。
  核心成长逻辑：
  1. 只做主流板块（主线行情是散户赚钱的最佳土壤）
  2. 跟随主力资金方向（北向/机构/游资合力方向）
  3. 分歧买入，一致卖出（买在恐慌，卖在高潮）
  4. 反复交易主线股，不轻易切换
  5. 记录交易、深度复盘、快速迭代

entry_conditions:
  # ===== 主线板块确认 =====
  main_line_confirm:
    - "板块指数处于上升趋势（均线多头排列）"
    - "板块内涨停数量持续 >= 3 家/天"
    - "板块成交量持续放大（量能稳定）"
    - "消息面/政策面有持续催化（至少3天）"
    - "板块内大市值中军股（中信证券/宁德时代等）稳定上涨"

  # ===== 分歧买点 =====  
  divergence_entry:
    - "板块情绪高潮后回调 2-3 天"
    - "回调缩量：成交量 < 上涨期均量 50%"
    - "股价回踩 10 日线或 20 日线企稳"
    - "出现阳线止跌信号（锤头/倒锤头）"
    - "次日竞价平开高走（情绪修复）"

  # ===== 题材发酵期 =====
  sector_ferment:
    - "新题材出现：消息发布后首个交易日"
    - "龙头股缩量一字板或快速秒板"
    - "跟风股出现明显助攻（3家以上）"
    - "板块涨停数量在接下来 3 天内持续增加"
    - "换手率健康（5-20%，无异常放大）"

exit_conditions:
  - "板块指数跌破 20 日线（趋势破坏）"
  - "板块成交量持续萎缩（资金撤退）"
  - "龙头切换（新龙头出现，原龙头走弱）"
  - "板块内跌停数量 > 10 家"
  - "主线逻辑兑现（政策落地/业绩公布）"

risk_management:
  stop_loss: "买入后跌破 10 日线减半仓，跌破 20 日线清仓"
  position_size: "主线明确时 4-5 成仓，分歧买点 2-3 成"
  max_positions: "3 只（主线 + 1 只辅线）"
  take_profit: "板块情绪高潮（涨停家数峰值）减仓"
  loss_limit: "单月亏损 > 15% 强制降仓休息"

core_principles:
  - "只做主线，不做杂毛"
  - "分歧买，一致卖"
  - "减少交易频率，专注主线股"
  - "每天复盘：涨停股、龙头股、板块联动"
  - "小富即安，不追求妖股暴利"

timeframe: "短线到中线（3天-3周）"
suitable_market: "趋势市/主题投资行情"
