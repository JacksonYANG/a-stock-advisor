# 赵老哥（赵一万→10万→10亿）打板战法
# 核心理念：只做确定性的涨停板，二板定龙头

name: 赵老哥打板战法
description: |
  A股传奇游资，从10万做到10亿的经典战法。
  核心原则：
  1. 二板定龙头：首板不确定，二板确认龙头地位
  2. 只做最强板块的最强龙头
  3. 亏损不超过总资金2%
  4. 赚钱靠坐电梯（让利润奔跑）

entry_conditions:
  # 二板模式（核心）
  second_board:
    - "首板为市场最强或唯一热点"
    - "次日竞价高开 3% 以上（竞价量 > 前日5%）"
    - "二板缩量或平量涨停（一致性预期强）"
    - "首板和二板均为快速封板（30分钟内）"
    - "无长上影线，封板坚决"
    - "所属板块有明确催化剂"

  # 弱转强模式
  weak_to_strong:
    - "前日烂板（多次炸板后封住）"
    - "次日竞价超预期高开"
    - "开盘后快速拉升封板"
    - "量能较前日缩小（筹码稳定）"

exit_conditions:
  - "三板以上炸板（龙头被证伪）"
  - "次日竞价低开（不及预期立即走）"
  - "封板后尾盘放量炸板"
  - "板块内出现更强势的竞争者"
  - "连续缩量板后突然放量（资金分歧）"

risk_management:
  stop_loss: "严格的 2% 总资金止损线"
  position_size: "单票不超过总资金 30%"
  max_positions: "同时最多 2 只"
  take_profit: "封板则留，不板则走；龙头可以多拿几天"

rules:
  - "不做首板（不确定性太高）"
  - "不做补涨（只做龙头）"
  - "不做庄股（流动性差）"
  - "不做下降趋势的股"
  - "大盘暴跌时空仓"

timeframe: "超短线（1-3天）"
suitable_market: "牛市/强势震荡市"
