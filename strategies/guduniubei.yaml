# 孤独牛背战法
# 核心理念：龙头连板接力，情绪共振，三板成妖

name: 孤独牛背战法（连板接力）
description: |
  孤独牛背核心哲学：
  1. 专注3板以上强势连板股，要求个股是板块中最强最早上板的
  2. 情绪共振选股：大盘+板块+个股三者共振，胜率最高
  3. 首板质量决定后续连板空间，首板必须是龙头
  4. 炸板次日若高开高走反包，积极参与
  5. 卡位股策略：关注先于龙头涨停、地位超越龙头的标的

entry_conditions:
  # 连板接力
  continuous_board:
    - "3板以上连板股（妖股摇篮）"
    - "必须是板块中最早上板的个股"
    - "封板坚决，无砸盘痕迹"
    - "同板块有跟风股助攻"

  # 情绪共振
  emotion_resonance:
    - "大盘情绪稳定（非下跌趋势）"
    - "板块涨停 >= 3家（板块效应强）"
    - "个股本身处于主升浪"

  # 首板确认
  first_board_best:
    - "首板必须是板块中第一个涨停"
    - "首板换手率合理（5-15%）"
    - "首板后回调不破首板实体50%"

  # 炸板反包
  board_break_rebound:
    - "前日炸板，今日高开高走"
    - "高开高走涨幅 > 5%"
    - "快速封板（10:30前）"

exit_conditions:
  - "高位长阴线（出货信号）"
  - "连续2日收盘跌破 MA5"
  - "炸板后次日低开低走"
  - "板块整体退潮，龙头不再封板"
  - "连板高度超过市场整体连板高度过多（注意特停风险）"

risk_management:
  stop_loss: "买入成本下方 7% 止损"
  trailing_stop: "盈利 > 20% 后，回撤 10% 止盈"
  position_size: "单票不超过总资金 20%"
  max_positions: "同时持有 2 只"
  take_profit: "连板破板当日减仓； +30% 以上分批止盈"

timeframe: "短线（3-7天）"
suitable_market: "强势市场 / 题材炒作期"
