# 六一中路游资战法
# 核心理念：情绪周期判断 + 板块轮动 + 超短打板

name: 六一中路游资战法
description: |
  典型超短线游资打法，核心是判断市场情绪周期。
  1. 冰点期（恐慌出清）→ 修复期（试错龙头）→ 高潮期（主升浪）→ 退潮期（止盈退出）
  2. 每个阶段有不同的操作策略
  3. 强调纪律：不及预期立即走人

entry_conditions:
  # ===== 情绪冰点反转 =====
  phase_bottom_reversal:
    - "市场连续下跌后出现地量地价"
    - "跌停数量从 50+ 降至 10 以下"
    - "出现逆势涨停的首板股（市场冰点的逆行者）"
    - "该股所属板块有政策催化或事件驱动"
    - "换手充分，首板换手率 8-15%"
    - "K线形态为长下影线或大阳线吞没"

  # ===== 主升加速 =====
  phase_breakout:
    - "龙头股突破前期高点或筹码密集区"
    - "板块出现 3 只以上涨停（板块共振）"
    - "量价配合：涨停时量能 > 5日均量 2 倍"
    - "MACD 在零轴上方发散"
    - "连续涨停中不出现放量大阴线"

  # ===== 龙回头 =====
  phase_pullback:
    - "龙头股经历 2-3 天回调后企稳"
    - "回调幅度不超过前一波涨幅的 50%"
    - "回调期间量能持续萎缩"
    - "MA10 或 MA20 形成支撑"
    - "板块内仍有补涨个股活跃"

exit_conditions:
  - "涨停板反复炸板（3次以上）"
  - "尾盘炸板（14:30 后打开涨停）"
  - "次日低开超过 3% 且无法快速翻红"
  - "板块龙头切换（新的更强龙头出现）"
  - "市场情绪进入退潮期（连板高度递减）"
  - "持仓股出现天量长上影线"

risk_management:
  stop_loss: "买入价下方 3%（超短线严格止损）"
  time_stop: "买入后 2 天不涨停则卖出（时间止损）"
  position_size: "单票不超过 25%"
  max_positions: "同时持有不超过 3 只"
  take_profit: "不板则走，封板则留"

emotion_cycle:
  冰点期: "观望为主，准备选股，关注逆势涨停"
  修复期: "轻仓试错新热点龙头，快进快出"
  高潮期: "重仓主线龙头，持股为主"
  退潮期: "逐步清仓，禁止追高，等待下一个冰点"

timeframe: "超短线（1-3天）"
suitable_market: "震荡市/牛市初期"
