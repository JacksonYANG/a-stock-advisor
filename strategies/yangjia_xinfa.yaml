# 养家心法（散户传奇：养家）
# 公认最系统的短线理论体系，影响数十万投资者
# 核心理念：理解市场、跟随情绪、控制回撤

name: 养家心法
description: |
  养家老师（网名"养家"）的短线交易体系，被业界公认为最完整的散户教材。
  核心框架：
  1. 市场情绪周期：冰点 → 修复 → 高潮 → 退潮 → 冰点
  2. 买入节点：买在分歧，卖在一致
  3. 仓位管理：赚钱时加仓，亏钱时减仓
  4. 选股优先级：龙头 > 跟风 > 补涨
  5. 控制回撤是短线生命线

entry_conditions:
  # ===== 冰点买入（左侧试错）=====
  ice_point_entry:
    - "大盘连续下跌3天以上，市场跌停 > 30家"
    - "情绪冰点：炸板率 > 60%，昨日涨停今日平均跌幅 > -3%"
    - "出现恐慌性杀跌后的缩量企稳"
    - "此时轻仓（1-2成）试探性买入龙头"

  # ===== 分歧转一致（右侧确认）=====
  consensus_entry:
    - "昨日炸板股今日高开超预期（竞价高开 > 3%）"
    - "板块涨停数量开始增加（3家以上）"
    - "龙头股竞价超预期（高开 > 5%）且缩量"
    - "量能：竞价量 > 昨日涨停成交额 10%"
    - "K线：跳空高开或平开快速拉升（10点前涨停）"

  # ===== 板块共振 =====  
  sector_resonance:
    - "板块有明确的政策或消息催化"
    - "板块涨停扩散效应（从小盘蔓延到中军）"
    - "龙头一字板或缩量秒封，显示主力锁仓"

exit_conditions:
  - "总龙头见顶（连续2天高位放量大阴线）"
  - "板块内跌停 > 10家（退潮信号）"
  - "昨日涨停今日亏钱效应明显（平均跌幅 > -5%）"
  - "连板高度降至2板以下（情绪退潮）"
  - "指数出现破位下跌（跌破5日线且放量）"

risk_management:
  stop_loss: "总资产回撤 > 3% 当日必须停止交易"
  position_per_trade: "首仓 2 成，确认后加至 4 成"
  max_loss_per_trade: "单笔亏损不超过总资产 2%"
  time_stop: "持仓 3 天不涨停必须出局"
  take_profit: "连板股不板即走；非连板冲高3%减半仓"
  cooling_off: "连续亏损3天，强制休息1周"

core_indicators:
  emotion_index:
    - "上涨家数 vs 下跌家数比值"
    - "昨日涨停股今日平均涨幅"
    - "炸板率（炸板数/涨停数）"
    - "跌停数量（判断冰点/退潮）"
    - "昨日炸板股今日平均高开幅度"
  market_index:
    - "竞价涨停数（集合竞价强势股数量）"
    - "盘中涨停炸板率"
    - "龙头股封单金额稳定性"

timeframe: "超短线（1-3天），最强选手可日内切换"
suitable_market: "所有市场（核心是情绪判断）"
