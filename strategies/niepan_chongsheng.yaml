# 涅磐重升战法
# 核心理念：情绪筹码博弈，弱转强模式，超短为主

name: 涅磐重升战法
description: |
  涅磐重升核心哲学：
  1. 情绪高潮期参与筹码博弈，在别人贪婪时兑现
  2. 弱转强是核心——前日炸板/走弱，次日弱转强是黄金买点
  3. 紧跟主力资金大单净量，超短持仓
  4. 情绪高潮日（涨停家数新高）果断获利了结
  5. 持仓周期极短，日内或次日了结

entry_conditions:
  # 弱转强模式（核心）
  weak_to_strong:
    - "前一交易日炸板或收阴，今日高开高走"
    - "高开幅度 > 3% 且 < 8%（太高容易砸盘）"
    - "成交放量，10点前封板为最佳"
    - "分时图回调不破分时均价线"
    - "板块情绪配合，整体强势"

  # 情绪共振
  emotion_resonance:
    - "昨日涨停今日溢价率高（>5%）"
    - "同板块有2只以上个股联动"
    - "市场情绪处于上升期（涨停>50家）"
    - "非高位股（近期涨幅 < 50%）"

  # 首板放量
  first_board_volume:
    - "首板涨停且换手率 > 8%"
    - "成交量较前日放大 > 2倍"
    - "封板时间早（10:30前为佳）"
    - "大单净量 > 0（主力资金流入）"

exit_conditions:
  - "持仓超过3个交易日无条件离场"
  - "情绪高潮日后次日开始减仓（涨停家数>150）"
  - "炸板后无法15分钟内回封"
  - "午后涨停炸板率 > 30% 同板块个股"
  - "低开幅度 > -5% 无修复迹象"

risk_management:
  stop_loss: "买入成本下方 5% 止损，不补仓"
  position_size: "单票不超过总资金 20%"
  max_positions: "同时不超过 3 只"
  take_profit: "次日开盘溢价 > 5% 减半仓； > 10% 清仓"

timeframe: "超短（1-3天）"
suitable_market: "情绪上升期 / 震荡市"
