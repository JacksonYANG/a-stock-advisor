# 龙头战法 - 只核大学生风格
# 核心理念：只做市场最强龙头，强者恒强，追涨不抄底

name: 龙头战法（只核大学生风格）
description: |
  专注于市场绝对龙头股的追涨策略。
  核心原则：只做最强不做次强，只追涨不抄底。
  强势股会不断超预期，弱势股会不断低于预期。

entry_conditions:
  - "必须是当前市场最强板块的龙头股（板块内涨幅前三）"
  - "首次涨停或连续涨停后的首次回封"
  - "换手率 > 8%（活跃度高）"
  - "成交量较前日放大 1.5 倍以上"
  - "MACD 金叉或在零轴上方运行"
  - "RSI6 在 60-80 之间（强势区间）"
  - "股价站上所有短期均线（MA5>MA10>MA20）"
  - "大盘当日非暴跌（跌幅 < 1.5%）"

exit_conditions:
  - "涨停板打开后无法回封（15分钟内）"
  - "量能急剧萎缩（量比 < 0.5）"
  - "连续两日收盘跌破 MA5"
  - "出现长上影线（实体 < 上影线的50%）"
  - "板块整体退潮，龙头不再独强"

risk_management:
  stop_loss: "买入价下方 5% 或跌破 MA5（以先触及者为准）"
  trailing_stop: "盈利 > 10% 后，回撤 5% 止盈"
  position_size: "单票不超过总资金 30%"
  max_positions: "同时持有不超过 2 只"
  take_profit: "第一目标：+15%，第二目标：+30%"

scoring_weights:
  momentum: 30      # 动量/涨停力度
  volume: 25        # 量能配合
  sector_strength: 25  # 板块强度
  trend: 15         # 趋势状态
  risk_control: 5   # 风控

timeframe: "短线（1-5天）"
suitable_market: "牛市/震荡市"
