# 作手刘炟鑫战法
# 知名短线游资，擅长龙头战法和情绪周期
# 核心理念：专注龙头、只做主升、不抄底不博反弹

name: 作手刘炟鑫龙头战法
description: |
  作手刘炟鑫是近年活跃的知名游资，以龙头战法为核心。
  核心逻辑：
  1. 只做龙头股，龙头是赚钱最快的品种
  2. 板块联动：龙头带动跟风，跟风强化龙头
  3. 主升浪持有：买在主升浪起点，持有到高潮
  4. 不抄底：只做突破，不做低吸
  5. 资金管理：顺势时重仓，逆势时轻仓

entry_conditions:
  # ===== 龙头确认 =====
  dragon_confirm:
    - "板块内率先涨停，且封板坚决"
    - "次日竞价高开 > 3%，竞价量 > 昨日成交 10%"
    - "板块涨停数量 >= 3 只（板块效应）"
    - "跟风股（后排）助攻涨停，板块形成梯队"
    - "涨停次日市场情绪稳定（非退潮期）"

  # ===== 主升浪起点 =====
  main_wave_entry:
    - "股价突破前高（创20日/60日新高）"
    - "放量：当天成交量 > 5日均量 2 倍"
    - "均线多头：MA5 > MA10 > MA20"
    - "K线形态：跳空高开/光头大阳线/涨停"
    - "MACD 在零轴上方二次金叉"

  # ===== 情绪共振 =====
  emotion_resonance:
    - "大盘处于上升趋势（均线多头）"
    - "板块资金净流入（非一日游）"
    - "板块涨停有扩散效应（中军、跟风齐涨）"
    - "北向资金或机构资金参与（量能放大）"

exit_conditions:
  - "龙头股高位放量大阴线（出货信号）"
  - "10:00 前未封板且分时图均线下方运行"
  - "板块跌停 > 10家（情绪退潮）"
  - "跟风股先于龙头股炸板（卡位失败）"
  - "指数跌破 5 日线且 3 日内未收复"
  - "连续 2 天炸板（主力出逃）"

risk_management:
  stop_loss: "浮亏 5% 止损（短线允许一定容忍）"
  position_size: "龙头首仓 3 成，确认主升后加到 5 成"
  max_positions: "2 只（极度集中）"
  take_profit: "高位放量滞涨减半仓；不板减仓"
  market_stop: "大盘破位立即清仓"

timeframe: "短线（3-10天）"
suitable_market: "强势市场/牛市"
