# 小鳄鱼涨停板战法
# 核心理念：涨停板是主力行为的终极体现，只做最强涨停
# 风格：极短止损，极高胜率，仓位集中

name: 小鳄鱼涨停板战法
description: |
  小鳄鱼（化名）是新生代游资代表，以"小止损、高胜率"著称。
  核心理念：
  1. 只做涨停板，涨停代表主力态度
  2. 首板、二板、三板各有不同战法
  3. 止损极严：浮亏 3% 必须走
  4. 仓位集中：单票可达 30%
  5. 弱市不做，专注强势市场

entry_conditions:
  # ===== 首板战法 =====
  first_board:
    - "股价突破近期整理平台（至少5天缩量）"
    - "分时图：早盘 10:00 前快速封板"
    - "封板质量：封单 > 5万手，无大单砸盘"
    - "换手率：首次涨停换手 8-20%"
    - "跟风股：大单封板时，同板块有跟风股助攻"

  # ===== 二板战法（确认为主）=====
  second_board:
    - "首板次日高开 > 3%，竞价量 > 首板成交 10%"
    - "高开低走但快速翻红（弱转强）"
    - "10:30 前封二板，封板坚决"
    - "二板必须是板块内最快涨停的个股"
    - "所属板块昨日有 >= 3 只涨停（板块效应）"

  # ===== 三板战法（妖股确认）=====
  third_board:
    - "三板是妖股分水岭，成妖后高度更高"
    - "三板次日竞价不能低开超过 -3%"
    - "高开高走或平开后快速拉升"
    - "封板时间越早越强势（10:00 前最优）"

exit_conditions:
  - "封板后炸板 > 3次，尾盘无法回封"
  - "次日低开 > 5% 且无法翻红"
  - "10:30 前未封板且分时图走弱"
  - "板块龙头切换（新龙头出现则旧龙头走）"
  - "换手率异常放大（> 30% 可能是出货）"

risk_management:
  stop_loss: "浮亏 3% 必须止损，极端纪律"
  position_size: "首仓 2 成，二板确认后加到 4 成"
  max_positions: "同时不超过 2 只（极致集中）"
  time_stop: "10:30 前未封板则出局（短线时间成本）"
  take_profit: "连板股次日不连板即走；非连板冲高卖"

key_signals:
  - "竞价金额 > 昨日涨停成交 8%"
  - "封单金额 > 1亿（稳封信号）"
  - "板块涨停家数演变（从1→3→5→扩散）"
  - "炸板后回封时间（越快越强）"

timeframe: "超短线（1-2天为主）"
suitable_market: "强势市场/牛市氛围"
