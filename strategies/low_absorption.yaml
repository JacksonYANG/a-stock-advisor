# 作手新一（刺客）低吸战法
# 核心理念：在强势股的回调低点买入，追求高盈亏比

name: 低吸战法（作手新一风格）
description: |
  作手新一的核心策略是低吸强势股的回调：
  1. 只低吸龙头股，不低吸弱势股
  2. 低吸点必须是重要支撑位
  3. 盈亏比至少 3:1
  4. 严格控制单笔亏损

entry_conditions:
  # 龙头回调低吸
  pullback_buy:
    - "个股前期有3天以上连续上涨（确立龙头地位）"
    - "当前处于回调第 2-3 天（最佳低吸时机）"
    - "回调至 MA5 或 MA10 附近"
    - "量能持续萎缩（缩量回调是良性）"
    - "MACD 红柱缩短但仍为正值"
    - "大盘当日无系统性风险"
    - "KDJ 的 J 值回落到 50 以下"

  # 板块轮动低吸
  rotation_buy:
    - "市场主线板块高位震荡"
    - "资金开始流入调整到位的副线板块"
    - "目标板块前期有过涨停潮"
    - "回调到 20 日均线附近"
    - "出现缩量十字星或小阳线企稳信号"

  # 大长腿低吸（分时图）
  intraday_buy:
    - "早盘快速下杀到分时均价线下方 3% 以上"
    - "随后快速拉回均价线附近"
    - "日K线形成长下影线"
    - "全天量能较前日缩小"
    - "个股处于上升趋势中"

exit_conditions:
  - "反弹至前高附近受阻（压力位止盈）"
  - "跌破 MA20 且放量"
  - "低吸后 3 天未反弹至买入价以上"
  - "板块出现新的下跌驱动"
  - "MACD 跌破零轴"

risk_management:
  stop_loss: "支撑位下方 2% 或 MA20 下方（以先触及者为准）"
  position_size: "单票不超过 30%"
  risk_reward_ratio: "至少 3:1（预期盈利/止损幅度）"
  max_positions: "同时持有 3 只"
  take_profit:
    - "第一目标：前高附近减仓 50%"
    - "第二目标：突破前高后减仓 30%"
    - "剩余仓位用 MA10 做移动止盈"

timeframe: "短线（3-7天）"
suitable_market: "震荡市/牛市回调期"
