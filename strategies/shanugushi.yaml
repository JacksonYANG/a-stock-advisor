# 善股什战法
# 核心理念：情绪周期择时，主线聚焦，弱转强

name: 善股什战法（情绪周期）
description: |
  善股什核心哲学：
  1. 情绪周期是核心：启动→发酵→高潮→衰退，循环往复
  2. 情绪高潮次日不接力（容易吃面）
  3. 弱转强是黄金买点：回调后的快速反包
  4. 只做主线题材，不做支线杂毛
  5. 退潮期果断空仓，不逆势操作

entry_conditions:
  # 情绪周期买点
  emotion_cycle:
    - "启动期：市场情绪回暖，涨停家数从 <20 回升至 >50"
    - "发酵期：板块主线明确，龙头股开始连板"
    - "参与时：情绪处于上升周期，大盘非下跌趋势"

  # 弱转强
  weak_to_strong:
    - "前日回调（炸板/阴线），今日快速反包"
    - "反包时间早（10:00前封板最佳）"
    - "高开幅度合理（3-7%）"
    - "量能配合（量比 > 1.5）"

  # 主线聚焦
  main_line:
    - "属于当前市场主线题材（当日最强板块）"
    - "非杂毛/支线/冷门题材"
    - "板块内有明显联动（多只涨停）"

exit_conditions:
  - "情绪高潮日后次日开始减仓"
  - "涨停次日高开低走/冲高回落（不接力）"
  - "主线切换，旧主线退潮"
  - "非主线持仓超过2日应离场"
  - "大盘出现系统性风险（暴跌 > 2%）"

risk_management:
  stop_loss: "买入后下跌 > 5% 止损"
  position_management:
    启动期: "轻仓试探（20%）"
    发酵期: "半仓持有（40-50%）"
    高潮期: "重仓持有（60-80%），逐步减仓"
    衰退期: "空仓或极小仓位（<10%）"
  take_profit: "高潮期分批止盈，不贪最后一棒"

timeframe: "短线（2-7天）"
suitable_market: "强势市场 / 情绪上升周期"
