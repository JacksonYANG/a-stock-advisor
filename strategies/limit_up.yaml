# 涨停战法 - 通用打板策略
# 核心理念：通过涨停板选股，识别主力资金意图

name: 涨停板战法
description: |
  A股特有的涨停板制度衍生出的经典策略。
  涨停板代表资金最强做多意愿。
  关键是区分：强势板 vs 跟风板 vs 诱多板。

entry_conditions:
  # 首板模式
  first_board:
    - "涨停时间早（10:00 前封板优先）"
    - "封板后不炸板或仅炸 1 次即回封"
    - "涨停时换手率在 5-15% 之间（适度换手）"
    - "量能为近期最大或次大量"
    - "板块有明确催化剂（政策、事件、业绩）"
    - "股价位置不在历史高位"

  # 连板模式
  consecutive_board:
    - "前日首板涨停坚决"
    - "次日竞价高开（> 2%）"
    - "开盘 30 分钟内封板"
    - "量能为前日 60-100%（量能不急剧放大）"
    - "无长上影线"

  # 反包板模式
  reversal_board:
    - "前日涨停后今日冲高回落（收阴或十字星）"
    - "次日低开后快速拉起"
    - "涨停突破前日高点"
    - "量能较前日放大"

board_quality:
  # 涨停板质量评估
  优质板:
    - "封板时间早（10:00 前）"
    - "封单量大（封单金额 > 流通市值 3%）"
    - "全天零炸板"
    - "所属板块有 3+ 只涨停"
  良性板:
    - "封板时间 10:00-13:30"
    - "炸板不超过 2 次"
    - "板块有跟风"
  劣质板:
    - "尾盘偷袭涨停（14:30 后）"
    - "多次炸板"
    - "板块无跟风"
    - "放巨量涨停"

exit_conditions:
  - "次日竞价大幅低开（> -3%）"
  - "高开后快速翻绿"
  - "封板后尾盘炸板无法回封"
  - "量能突然异常放大（5倍以上均量）"
  - "连续涨停后出现放量大阴线"

risk_management:
  stop_loss: "买入价下方 4% 或次日开盘价下方 3%"
  position_size: "首板仓位 20%，确认连板后加仓至 40%"
  max_positions: "同时 2-3 只"
  take_profit: "不板则卖，三板以上可以格局"

timeframe: "超短线（1-5天）"
suitable_market: "有明确主线的市场"
