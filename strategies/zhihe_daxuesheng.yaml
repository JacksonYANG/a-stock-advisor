# 只核大学生战法（雪球/小红书知名博主）
# 核心理念：基本面选股 + 技术面择时，只做自己看得懂的公司
# 风格：价值成长，中线持有，不追热点

name: 只核大学生价值成长战法
description: |
  "只核大学生"风格：深度研究基本面，只买自己能看懂的公司。
  核心逻辑：
  1. 只做自己能力圈内的股票（消费/医药/科技龙头）
  2. 好公司 + 好价格 = 买入
  3. 下跌是买入机会，上涨是验证逻辑
  4. 不追题材不追热点，耐心等待价值回归
  5. 止损宽松（10%），止损后深入复盘

entry_conditions:
  # ===== 好公司低价 =====  
  value_entry:
    - "PE/PB 处于历史低位区间（PE < 历史30%分位）"
    - "近3年净利润增速 > 10%"
    - "ROE > 15%（持续性）"
    - "现金流健康（经营现金流 > 净利润）"
    - "行业龙头或细分龙头，品牌护城河清晰"

  # ===== 技术面买点 =====
  technical_entry:
    - "股价处于中长期均线（MA60/MA120）上方"
    - "近期有缩量回踩MA20企稳信号"
    - "成交量萎缩后放量突破整理平台"
    - "MACD 零轴上方金叉"
    - "日线级别底背离（结合RSI）"

  # ===== 市场环境 =====
  market_context:
    - "大盘处于震荡市或慢牛初期"
    - "主线板块资金稳定流入"
    - "北向资金净买入（非做空信号）"

exit_conditions:
  - "PE处于历史高位（>80%分位）且股价高位放量滞涨"
  - "净利润连续2个季度负增长"
  - "股价跌破MA60且3日内未能收复"
  - "出现系统性风险（大盘暴跌 > 3%）"
  - "逻辑被证伪（业务数据持续低于预期）"

risk_management:
  stop_loss: "买入价下方 8-10%（基本面选手止损宽松）"
  time_stop: "持有期 1-3 个月，不短线止损"
  position_size: "单票 20-30%（集中持有所看好的公司）"
  max_positions: "同时持有 3-4 只（高度集中）"
  take_profit: "目标收益 30-50%，分批止盈（1/3/1）"

stock_pool:
  - "行业龙头（茅台/宁德/比亚迪/腾讯等）"
  - "细分隐形冠军（市场占有率 > 30%）"
  - "困境反转型（ROE修复期）"
  - "科创板/创业板成长股（增速 > 30%）"

forbidden_stocks:
  - "ST股、绩差股"
  - "商誉占净资产 > 50%"
  - "应收账款异常增长"
  - "主营业务不清晰（频繁转型）"

timeframe: "中线（1-6个月）"
suitable_market: "震荡市/慢牛"
