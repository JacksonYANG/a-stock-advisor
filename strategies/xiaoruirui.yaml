# 小睿睿战法
# 核心理念：龙头锁仓，躺赢不轻易下车，分时图精准介入

name: 小睿睿战法（龙头锁仓）
description: |
  小睿睿核心哲学：
  1. 只做最强龙头，确认地位后果断锁仓
  2. 不轻易中途下车，让利润奔跑
  3. 分时图回调低点介入（回调不超一定比例）
  4. 缩量加速=主力锁仓，继续看涨
  5. 首阴战法：连续涨停后首次回调，次日反包继续持有

entry_conditions:
  # 龙头确认
  dragon_confirm:
    - "必须是板块中第一个涨停的个股"
    - "封板坚决，盘口无大单砸盘"
    - "所属板块涨停 >= 3家"
    - "近期无利空/非高位股"

  # 锁仓买点
  lock_position:
    - "分时图回调至均价线附近获得支撑"
    - "回调幅度 < 3%（浅回调为佳）"
    - "回调时成交量萎缩（主力未出货）"
    - "出现缩量加速形态（量能<昨日70%）"
    - "当日涨幅 > 5%，处于主升浪"

  # 首阴战法
  first_yin:
    - "连续涨停 3板以上后出现第一根阴线"
    - "阴线量能 < 前一阳线（缩量回调）"
    - "收盘价仍站在 MA5 之上"
    - "次日能高开高走反包"

exit_conditions:
  - "高位放量长阴线（出货迹象）"
  - "跌停板跌破，且次日无法修复"
  - "连续2日收盘跌破 MA5"
  - "尾盘炸板且无力回封"
  - "板块整体退潮，龙头不再独强"

risk_management:
  stop_loss: "分时收盘跌破 MA5 止盈/止损线"
  trailing_stop: "盈利 > 15% 后，回撤 8% 止盈"
  position_size: "单票不超过总资金 25%（龙头重仓）"
  max_positions: "同时持有 1-2 只（专注龙头）"
  take_profit: "目标：+20% 减半仓，+40% 清仓"

timeframe: "短中线（3-10天）"
suitable_market: "强势市场 / 龙头股行情"
