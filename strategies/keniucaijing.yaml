# 科牛财经战法
# 核心理念：分阶段涨停板策略，首板→二板→三板各有策略

name: 科牛财经战法（分阶段涨停）
description: |
  科牛财经核心哲学：
  1. 首板战法：无敌砸盘、抛压小、封单坚决是首板核心
  2. 二板定龙头：能连续两板的个股更容易成为真龙头
  3. 三板成妖：三连板是成妖的重要标志，享受高溢价
  4. 涨停回调买：强势股回调到均线（MA5/MA10）时是较好买点
  5. 炸板处理：炸板后次日低开低走止损，平/高开观望

entry_conditions:
  # 首板战法
  first_board:
    - "首板封板坚决，抛压小（撤单率低）"
    - "换手率 5-15%（活跃但不过度）"
    - "属于当前热门题材"
    - "最好10:30前封板"
    - "分时图成交明细干净，无大单砸盘"

  # 二板定龙头
  second_board:
    - "首板后次日高开高走"
    - "两板间隔不超过3个交易日"
    - "二板换手率合理（< 20%）"
    - "二板时板块整体配合"

  # 三板成妖
  third_board:
    - "前两板稳定，第三板缩量加速"
    - "三板换手率 < 前一板的70%（主力锁仓）"
    - "三板后享受妖股溢价"
    - "三板后回调到MA5是重要支撑"

  # 涨停回调买
  limit_up_pullback:
    - "强势涨停后回调到 MA5/MA10"
    - "回调时量能萎缩（主力未出货）"
    - "回调不破涨停实体50%"
    - "MA5/MA10 有明显支撑"

exit_conditions:
  - "首板后次日低开低走，跌破首板实体"
  - "二板后次日高开低走，不反包"
  - "三板后高位炸板且无力回封"
  - "特停风险（连续3板以上可能特停）"
  - "尾盘炸板且量能异常放大"

risk_management:
  stop_loss: "跌破首板实体最低点止损"
  position_size: "首板 15%，二板 20%，三板 25%"
  max_positions: "同时持有 2-3 只"
  take_profit: "二板后目标 +15%，三板后目标 +30%"

timeframe: "超短（1-5天）"
suitable_market: "强势市场 / 题材炒作期"
