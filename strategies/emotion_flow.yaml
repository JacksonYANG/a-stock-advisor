# 涅槃重生（炒股养家）情绪流战法
# 核心理念：市场情绪是核心驱动因素，顺势而为

name: 情绪流战法（炒股养家风格）
description: |
  炒股养家的核心交易哲学：
  1. 市场永远是对的，不要和市场作对
  2. 买入分歧，卖出一致
  3. 弱市不做，强市重仓
  4. 仓位管理比选股更重要

entry_conditions:
  # 买入分歧（别人恐惧时贪婪）
  buy_divergence:
    - "市场整体处于恐慌状态（跌停 > 20家）"
    - "优质个股被错杀（基本面无重大利空）"
    - "股价触及布林带下轨或重要支撑位"
    - "成交量突然放大（恐慌盘涌出）"
    - "RSI 进入超卖区（RSI6 < 25）"
    - "该股前期走势强于大盘（相对强度高）"

  # 龙头首阴买入
  dragon_first_yin:
    - "板块龙头股在连续上涨后首次收阴"
    - "阴线量能不大（缩量回调）"
    - "收盘价仍站在 MA5 之上"
    - "板块整体趋势向好"
    - "回调幅度不超过前一波涨幅的 30%"

  # 突破回踩买入
  breakout_pullback:
    - "股价放量突破重要压力位后"
    - "回调至突破位附近获得支撑"
    - "量能萎缩至突破前的水平"
    - "MACD 仍在零轴上方"

exit_conditions:
  - "市场情绪一致看多时逐步减仓（别人贪婪时恐惧）"
  - "持仓股放量滞涨"
  - "板块整体出现退潮信号"
  - "指数出现顶部信号（天量、长上影）"

risk_management:
  stop_loss: "买入价下方 5%（单笔最大亏损）"
  position_management:
    弱市: "空仓或极小仓位试错（< 10%）"
    震荡市: "轻仓操作（20-40%）"
    强市: "重仓出击（60-80%）"
    极强市: "满仓龙头（80-100%）"
  take_profit: "分批止盈，第一笔 +10%，第二笔 +20%，剩余让利润奔跑"

emotion_indicators:
  极度恐惧: "跌停 > 50家，两日连跌 > 5%，地量 → 准备抄底"
  恐惧: "跌停 20-50家，持续阴跌 → 小仓试错"
  中性: "涨跌各半，方向不明 → 观望"
  贪婪: "涨停 > 100家，连续大涨 → 开始减仓"
  极度贪婪: "涨停 > 200家，天量成交 → 清仓"

timeframe: "中短线（3-15天）"
suitable_market: "所有市场环境（关键是仓位管理）"
