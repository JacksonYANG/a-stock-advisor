# 职业抄手陈凯战法
# 陈凯（股票讲师）系统化交易课程，主打"三板斧"体系
# 核心理念：标准化选股、流程化止损、纪律化执行

name: 职业抄手陈凯三板斧战法
description: |
  陈凯的"三板斧"体系是最适合普通散户学习的系统化交易方法。
  核心三板斧：
  1. 第一斧（选股）：找出当日最强板块的龙头股
  2. 第二斧（择时）：识别关键点位（支撑/压力/突破）
  3. 第三斧（止损）：买入即设止损，亏损3%无条件走
  特点：标准化、可复制、有完整闭环

entry_conditions:
  # ===== 第一斧：选股 =====  
  board_selection:
    - "当日涨幅前3板块，每个板块选最强龙头"
    - "龙头股标准：率先涨停、封板坚决、无炸板历史"
    - "板块内涨停 >= 3家（板块效应）"
    - "板块涨停有梯度：龙头、跟风、补涨齐全"
    - "优先选择：主升浪中个股 > 突破关键位个股 > 超跌反弹个股"

  # ===== 第二斧：择时 =====
  timing_entry:
    - "突破买入：股价突破前一天高点 + 放量（最优买点）"
    - "回调买入：回踩3日/5日均线企稳（次优买点）"
    - "涨停买入：竞价高开3%+ 早盘10点前封板（激进买点）"
    - "缩量回调：回调时成交量 < 上涨期均量40%（主力控盘）"
    - "分时图：回调不破均线（二次启动信号）"

  # ===== 第三斧：止损原则 =====
  stop_loss_rules:
    - "买入价下方 3% 设硬止损，不主观意淫"
    - "跌破均线（MA5/MA10）减仓"
    - "次日低开 > 3% 先减半仓"
    - "时间止损：持仓3天不涨不跌，走人"

exit_conditions:
  - "止损触发：亏损达3%无条件离场"
  - "跌破MA5减半仓，跌破MA10清仓"
  - "龙头股见顶信号：高位长阴、炸板、尾盘炸"
  - "板块情绪退潮：跌停 > 10家"
  - "指数破位：跌破5日线且放量"

risk_management:
  stop_loss: "亏损 3% 无条件止损（铁律）"
  position_size: "每笔交易最大亏损 = 总资产 1.5%"
  max_loss_per_day: "当日亏损 > 2% 停止交易"
  max_loss_per_week: "本周亏损 > 5% 降低仓位"
  take_profit: "盈利 > 10% 移动止损到成本价"
  cooling_off: "连续2天亏损，强制休息1天"

execution_checklist:
  - "□ 板块今日涨幅是否前3？"
  - "□ 龙头股是否率先涨停？"
  - "□ 封板质量（无炸板、封单充足）？"
  - "□ 板块是否形成梯队（3家+涨停）？"
  - "□ 大盘是否非下跌趋势？"
  - "□ 止损位置是否明确（3%）？"

timeframe: "超短线到短线（1-5天）"
suitable_market: "强势市场/主题行情"
