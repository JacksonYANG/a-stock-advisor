# ============================================================
# 游资席位注册表
# 知名游资/主力 → 营业部席位映射
# 数据来源: 东方财富龙虎榜 + 社区情报
# 维护说明: 游资可能更换席位，需定期更新
# ============================================================

groups:
  # ===== 顶级游资 =====

  - name: 佛山系
    aliases: [佛山无影脚, 佛山帮]
    description: 以超短线打板著称，擅长弱市中逆势拉涨停
    level: S    # S=顶级 A=知名 B=活跃
    seats:
      - 国盛证券有限责任公司佛山分公司
      - 光大证券股份有限公司佛山绿景路证券营业部
      - 光大证券股份有限公司佛山季华六路证券营业部
      - 第一创业证券股份有限公司佛山第一分公司
      - 华鑫证券有限责任公司佛山顺德近良路证券营业部
      - 华鑫证券有限责任公司佛山南海海五路证券营业部

  - name: 炒股养家
    aliases: [养家]
    description: 情绪周期流派，买分歧卖一致，仓位管理大师
    level: S
    seats:
      - 华鑫证券有限责任公司上海浦雪路证券营业部
      - 华鑫证券有限责任公司上海茅台路证券营业部
      - 华鑫证券有限责任公司上海松江证券营业部
      - 华鑫证券有限责任公司宁波沧海路证券营业部

  - name: 陈小群
    aliases: [小群]
    description: 新生代游资，擅长龙头股接力，风格凶悍
    level: S
    seats:
      - 中国中金财富证券有限公司北京宋庄路证券营业部
      - 中国中金财富证券有限公司南京太平南路证券营业部

  - name: 瑞鹤仙
    aliases: [鹤仙]
    description: 趋势高手，善于把握主升浪
    level: A
    seats:
      - 中信建投证券股份有限公司上海徐家汇路证券营业部
      - 光大证券股份有限公司宁波中山西路证券营业部

  - name: 湖里大道
    aliases: [厦门湖里]
    description: 厦门游资代表，擅长题材炒作和龙头接力
    level: A
    seats:
      - 兴业证券股份有限公司厦门湖里大道证券营业部

  - name: 成都系
    aliases: [成都帮]
    description: 多席位联动，擅长超短线打板和连板接力
    level: A
    seats:
      - 国泰君安证券股份有限公司成都北一环路证券营业部
      - 国泰海通证券股份有限公司成都北一环路证券营业部
      - 华泰证券股份有限公司成都蜀金路证券营业部
      - 华泰证券股份有限公司成都人民南路证券营业部
      - 国金证券股份有限公司成都交子大道证券营业部
      - 国金证券股份有限公司成都高新区交子大道证券营业部

  - name: 赵老哥
    aliases: [赵一万, 赵老割]
    description: 二板确认龙头，确定性打板，A股传奇
    level: S
    seats:
      - 中国银河证券股份有限公司绍兴证券营业部
      - 浙商证券股份有限公司绍兴分公司

  - name: 作手新一
    aliases: [新一]
    description: 强势股回调低吸，风险收益比≥3:1
    level: A
    seats:
      - 南京证券股份有限公司南京大钟亭证券营业部

  - name: 只核大学生
    aliases: [大学生]
    description: 只做龙头，从不抄底弱势
    level: A
    seats:
      # 席位未公开确认，需要通过龙虎榜历史反推
      # 暂留空，运行时自动匹配

  - name: 六一中路
    aliases: [六一]
    description: 情绪周期超短打板，冰点修复→高潮→退潮
    level: A
    seats:
      # 席位未公开确认，需要通过龙虎榜历史反推

  # ===== 散户集中营（反向指标） =====

  - name: 拉萨天团
    aliases: [拉萨帮, 东方财富拉萨]
    description: 散户集中营，上榜后胜率低，常作反向指标
    level: B
    is_retail: true   # 标记为散户集中营，非单一游资
    seats:
      - 东方财富证券股份有限公司拉萨团结路第一证券营业部
      - 东方财富证券股份有限公司拉萨团结路第二证券营业部
      - 东方财富证券股份有限公司拉萨东环路第一证券营业部
      - 东方财富证券股份有限公司拉萨东环路第二证券营业部
      - 东方财富证券股份有限公司拉萨金融城南环路证券营业部

  # ===== 机构/外资 =====

  - name: 深股通
    aliases: [南向资金]
    description: 深股通专用席位，代表外资动向
    level: S
    is_institutional: true
    seats:
      - 深股通专用

  - name: 沪股通
    aliases: [北向资金]
    description: 沪股通专用席位，代表外资动向
    level: S
    is_institutional: true
    seats:
      - 沪股通专用

  - name: 机构专用
    aliases: [公募, 险资]
    description: 公募/保险/社保等机构专用席位
    level: S
    is_institutional: true
    seats:
      - 机构专用

# ============================================================
# 关键词匹配规则（用于自动发现新席位）
# 当营业部名称包含以下关键词时，自动关联到对应游资
# ============================================================
keyword_rules:
  - group: 佛山系
    keywords: [佛山分公司, 佛山绿景, 佛山季华, 佛山南海]

  - group: 成都系
    keywords: [成都北一环, 成都蜀金路, 成都人民南路]

  - group: 湖里大道
    keywords: [厦门湖里]

  - group: 拉萨天团
    keywords: [拉萨团结路, 拉萨东环路, 拉萨金融城]

  - group: 炒股养家
    keywords: [华鑫证券]   # 养家常用华鑫席位

# ============================================================
# 自选股联动预警
# 当以下游资买入自选股时，触发预警
# ============================================================
alert_groups:
  - 佛山系
  - 炒股养家
  - 陈小群
  - 赵老哥
  - 湖里大道
  - 作手新一
  - 瑞鹤仙
